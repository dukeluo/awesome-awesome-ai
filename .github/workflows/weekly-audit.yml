name: Weekly Curation Audit

on:
  schedule:
    # Run every Sunday at 8:00 AM in UTC-8 (16:00 UTC)
    - cron: '0 16 * * 0'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Audit Repository Links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          README="README.md"
          AUDIT_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          TOTAL=0
          DEAD_COUNT=0
          ARCHIVED_COUNT=0
          DEAD_LIST=""
          ARCHIVED_LIST=""

          echo "🔍 Starting weekly link audit..."
          echo ""

          # Extract unique GitHub repos from markdown links in README
          # Pattern: (https://github.com/owner/repo)
          REPOS=$(grep -oE '\(https://github\.com/[^/]+/[^/)]+\)' "$README" \
            | sed 's/[()]//g; s|https://github.com/||' \
            | grep -v 'dukeluo/awesome-awesome-ai' \
            | sort -u) || true

          for repo in $REPOS; do
            TOTAL=$((TOTAL + 1))
            printf "  %-60s " "$repo"

            HTTP_STATUS=$(curl -s -o /tmp/repo_response.json -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repo") || HTTP_STATUS="000"

            case "$HTTP_STATUS" in
              200)
                ARCHIVED=$(jq -r '.archived // false' /tmp/repo_response.json)
                if [ "$ARCHIVED" = "true" ]; then
                  echo "⚠️  archived"
                  ARCHIVED_COUNT=$((ARCHIVED_COUNT + 1))
                  ARCHIVED_LIST="${ARCHIVED_LIST}- [\`${repo}\`](https://github.com/${repo})\n"
                else
                  echo "✅"
                fi
                ;;
              404|451)
                echo "❌ dead (${HTTP_STATUS})"
                DEAD_COUNT=$((DEAD_COUNT + 1))
                DEAD_LIST="${DEAD_LIST}- \`${repo}\`\n"
                # Remove the entire table row containing this repo
                sed -i "\|github\.com/${repo}[^a-zA-Z0-9_-]|d" "$README"
                ;;
              *)
                echo "⚠️  HTTP ${HTTP_STATUS} (skipped)"
                ;;
            esac
          done

          VALID_COUNT=$((TOTAL - DEAD_COUNT))

          echo ""
          echo "📊 Results: ${TOTAL} checked, ${VALID_COUNT} valid, ${DEAD_COUNT} dead, ${ARCHIVED_COUNT} archived"

          # Update or insert the "Last audited" timestamp in README
          if grep -q '^_Last audited:' "$README"; then
            sed -i "s|^_Last audited:.*|_Last audited: ${AUDIT_DATE}_|" "$README"
          else
            # Insert a footer with timestamp before the link reference definitions
            awk -v date="$AUDIT_DATE" '
              /^\[x-image\]:/ && !inserted {
                print "---"
                print ""
                print "_Last audited: " date "_"
                print ""
                inserted=1
              }
              { print }
            ' "$README" > README.tmp && mv README.tmp "$README"
          fi

          # Clean up legacy audit file if present
          rm -f .github/last-audit.txt

          # Generate PR body
          {
            echo "## 🔍 Weekly Repository Audit"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Repos checked | ${TOTAL} |"
            echo "| ✅ Valid | ${VALID_COUNT} |"
            echo "| ❌ Dead (removed) | ${DEAD_COUNT} |"
            echo "| ⚠️ Archived | ${ARCHIVED_COUNT} |"

            if [ "$DEAD_COUNT" -gt 0 ]; then
              echo ""
              echo "### ❌ Dead Links Removed"
              echo ""
              printf "%b" "$DEAD_LIST"
            fi

            if [ "$ARCHIVED_COUNT" -gt 0 ]; then
              echo ""
              echo "### ⚠️ Archived Repos (kept but flagged)"
              echo ""
              printf "%b" "$ARCHIVED_LIST"
            fi

            if [ "$DEAD_COUNT" -eq 0 ] && [ "$ARCHIVED_COUNT" -eq 0 ]; then
              echo ""
              echo "✨ All repository links are healthy!"
            fi

            echo ""
            echo "---"
            echo "*Auto-generated by the [weekly audit workflow](../../actions/workflows/weekly-audit.yml). CodeRabbit will review the changes.*"
          } > /tmp/pr-body.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly repository audit"
          branch: weekly-audit-pr
          delete-branch: true
          title: "chore: weekly repository audit 🔍"
          body-path: /tmp/pr-body.md
          labels: |
            automated-audit
            ai-curation
